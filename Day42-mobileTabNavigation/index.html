<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Mobile Tab Navigation</title>
  </head>
  <body>
    <div class="phone">
      <img
        src="https://i.pinimg.com/736x/f2/6b/41/f26b417963280e8ed94ab4ecbaad32c9.jpg"
        alt="home"
        class="content show"
      />
      <img
        src="https://i.pinimg.com/1200x/17/2c/40/172c40023824139be11880be7439442a.jpg"
        alt="work"
        class="content"
      />
      <img
        src="https://i.pinimg.com/736x/e7/5b/23/e75b238f3c6523e0258c9b43b679f327.jpg"
        alt="blog"
        class="content"
      />
      <img
        src="https://i.pinimg.com/736x/23/e7/c4/23e7c4072b70f7ef2df96fb0cf5a8c87.jpg"
        alt="about"
        class="content"
      />

      <nav>
        <ul>
          <li class="active">
            <i class="fas fa-home"></i>
            <p>Home</p>
          </li>
          <li>
            <i class="fas fa-box"></i>
            <p>Work</p>
          </li>
          <li>
            <i class="fas fa-book-open"></i>
            <p>Blog</p>
          </li>
          <li>
            <i class="fas fa-users"></i>
            <p>About us</p>
          </li>
        </ul>
      </nav>
    </div>
    <script src="script.js"></script>
  </body>
</html>
