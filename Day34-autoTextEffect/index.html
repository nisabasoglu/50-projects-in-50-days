<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Auto Text</title>
</head>
<body>
    <h1 id="text">Starting...</h1>
    <div>
        <label for="speed">Speed</label>
        <input type="number" name="speed" id="speed" value="1" min="1" max="5" step="1">
    </div>
    <script src="script.js"></script>
</body>
</html>


<!-- 

<label> — Bir form elemanına açıklayıcı metin ekler.

for="speed" özelliği, bu label'ın hangi input'a ait olduğunu belirtir. for değeri, input'un id değeriyle eşleşmeli.

----------------------------------------

<input> — Kullanıcıdan veri giriş alanı oluşturur.

type="number" → sadece sayı girişine izin verir
name="speed" → form gönderildiğinde sunucuya bu isimle gider
id="speed" → label'ın for özelliğiyle eşleşerek ikisini birbirine bağlar

-->
